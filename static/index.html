<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>経費管理（青色申告）</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>経費管理</h1>
    <nav>
      <button class="tab active" data-tab="input">経費を入力</button>
      <button class="tab" data-tab="list">一覧</button>
      <button class="tab" data-tab="summary">集計・確定申告</button>
    </nav>
  </header>

  <main>
    <!-- 入力タブ -->
    <section id="tab-input" class="tab-panel active">
      <h2 id="form-title">経費を入力</h2>
      <form id="expense-form">
        <input type="hidden" id="edit-id" />
        <div class="grid">
          <label>日付<span class="req">*</span>
            <input type="date" id="f-date" required />
          </label>
          <label>勘定科目<span class="req">*</span>
            <select id="f-category" required></select>
          </label>
          <label>金額（円・税込）<span class="req">*</span>
            <input type="number" id="f-amount" min="0" step="1" required placeholder="例: 1200" />
          </label>
          <label>支払先
            <input type="text" id="f-payee" placeholder="例: ○○商店" list="payee-list" />
            <datalist id="payee-list"></datalist>
          </label>
          <label>支払方法
            <select id="f-payment"></select>
          </label>
          <label class="checkbox">
            <input type="checkbox" id="f-receipt" /> 領収書あり
          </label>
        </div>
        <label class="full">摘要・メモ
          <input type="text" id="f-memo" placeholder="例: 打ち合わせ用の資料代" />
        </label>
        <div class="actions">
          <button type="submit" class="primary" id="submit-btn">登録する</button>
          <button type="button" id="cancel-edit" class="ghost" hidden>編集をやめる</button>
          <span id="form-msg" class="msg"></span>
        </div>
      </form>
      <p class="hint">青色申告の勘定科目に沿って入力できます。新しい科目は「集計・確定申告」タブから追加できます。</p>
    </section>

    <!-- 一覧タブ -->
    <section id="tab-list" class="tab-panel">
      <h2>経費一覧</h2>
      <div class="filters">
        <select id="filter-year"></select>
        <select id="filter-month">
          <option value="">月：すべて</option>
        </select>
        <select id="filter-category"><option value="">科目：すべて</option></select>
        <input type="search" id="filter-keyword" placeholder="支払先・摘要で検索" />
      </div>
      <div class="list-total">表示中の合計：<strong id="list-total-amount">0</strong> 円（<span id="list-count">0</span>件）</div>
      <div class="table-wrap">
        <table id="expense-table">
          <thead>
            <tr>
              <th>日付</th><th>勘定科目</th><th class="num">金額</th>
              <th>支払先</th><th>支払方法</th><th>摘要</th><th>領収</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="empty" id="list-empty" hidden>データがありません。</p>
    </section>

    <!-- 集計タブ -->
    <section id="tab-summary" class="tab-panel">
      <h2>集計・確定申告</h2>
      <div class="filters">
        <select id="summary-year"></select>
        <a id="export-btn" class="btn primary" href="#">CSVダウンロード</a>
      </div>

      <div class="cards">
        <div class="card big">
          <div class="card-label">年間経費合計</div>
          <div class="card-value"><span id="sum-total">0</span> 円</div>
          <div class="card-sub"><span id="sum-count">0</span> 件</div>
        </div>
      </div>

      <h3>科目別集計（確定申告書の経費欄に対応）</h3>
      <div class="table-wrap">
        <table id="cat-table">
          <thead><tr><th>勘定科目</th><th class="num">金額</th><th class="num">件数</th><th class="num">割合</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <h3>月別推移</h3>
      <div id="month-chart" class="chart"></div>

      <h3>勘定科目の追加</h3>
      <form id="cat-form" class="inline-form">
        <input type="text" id="new-cat" placeholder="追加する科目名" />
        <button type="submit" class="ghost">追加</button>
        <span id="cat-msg" class="msg"></span>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
