# PostgreSQL をローカルで起動するための設定（Phase 0）
#
#   起動:  docker compose up -d
#   停止:  docker compose down
#   中身を見る: docker compose exec db psql -U keihi -d keihi
#
# データは名前付きボリューム pgdata に残るので、down してもデータは消えません。
# 完全に消したいときは:  docker compose down -v

services:
  db:
    image: postgres:16
    container_name: keihi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keihi
      POSTGRES_PASSWORD: keihi_dev_password
      POSTGRES_DB: keihi
    ports:
      - "5432:5432"          # ホストの5432 → コンテナの5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keihi -d keihi"]
      interval: 5s
      timeout: 5s
      retries: 5

  # v2 アプリ本体（FastAPI）をコンテナで動かす。
  #   起動: docker compose up -d --build
  #   画面/API: http://localhost:8765
  app:
    build:
      context: .                    # 画面ファイル static/ も含めるためリポジトリ直下を context にする
      dockerfile: backend/Dockerfile
    container_name: keihi-app
    restart: unless-stopped
    ports:
      - "8765:8765"                 # ホスト8765 → コンテナ8765（ポートは固定）
    environment:
      # コンテナ内からは localhost ではなく サービス名 db で DB に繋ぐ
      DATABASE_URL: "postgresql+psycopg2://keihi:keihi_dev_password@db:5432/keihi"
    depends_on:
      db:
        condition: service_healthy  # DB が healthy になってからアプリを起動

volumes:
  pgdata:
